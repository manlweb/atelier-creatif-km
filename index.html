<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atelier Creatif KM</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */
body {
    margin: 0;
    background: #1a1a1a;
    color: #f2e9dc;
    font-family: 'Montserrat', sans-serif;
}

/* =========================
   HERO
========================= */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.logo {
    width: 220px;
    margin-bottom: 25px;
    border-radius: 50%;
}

.gold {
    color: #c9a85d;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
}

/* =========================
   BOTONES
========================= */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 14px 30px;
    border: 1px solid #c9a85d;
    color: #c9a85d;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #c9a85d;
    color: #000;
}

/* =========================
   SECCIONES
========================= */
.section {
    padding: 80px 20px;
    text-align: center;
}

.section h2 {
    font-family: 'Playfair Display', serif;
    color: #c9a85d;
}

/* =========================
   CATEGORÍAS
========================= */
.category-title {
    font-size: 20px;
    color: #c9a85d;
    margin: 40px 0 20px;
    font-family: 'Playfair Display', serif;
}

/* =========================
   CATÁLOGO TIPO TIENDA
========================= */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: auto;
}

.product {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    background: #121212;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.product img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    transition: transform 0.4s ease;
}

.product:hover {
    transform: translateY(-6px);
}

.product:hover img {
    transform: scale(1.08);
}

/* =========================
   LIGHTBOX (ZOOM)
========================= */
.lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

/* =========================
   PROCESO
========================= */
.steps {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
}

.step {
    background: #121212;
    border: 1px solid rgba(201,168,93,0.4);
    padding: 25px;
    border-radius: 12px;
    width: 220px;
    transition: 0.3s;
}

.step:hover {
    transform: translateY(-8px);
    border-color: #c9a85d;
}

.step h3 {
    color: #c9a85d;
}

/* =========================
   FOOTER
========================= */
footer {
    padding: 25px;
    text-align: center;
    border-top: 1px solid #222;
    opacity: 0.7;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div>
    <img src="logo.jpeg" class="logo">

    <p>
      <span class="gold">Atelier Creatif KM</span><br><br>
      Diseños personalizados con identidad premium.
    </p>

    <a href="#catalogo" class="btn">Ver catálogo</a>
  </div>
</section>

<!-- CATALOGO -->
<section class="section" id="catalogo">

<h2>Catálogo</h2>

<!-- Películas -->
<div class="category-title">Películas</div>
<div class="gallery">

    <div class="product"><img src="playerayvaso.jpeg"></div>
    <div class="product"><img src="tazacalcetinaalmohadabettlejuice.jpeg"></div>
    <div class="product"><img src="playeraansiedad.jpeg"></div>

</div>

<!-- Deportes -->
<div class="category-title">Deportes</div>
<div class="gallery">

    <div class="product"><img src="sudaderaDT.jpeg"></div>

</div>

<!-- Navidad -->
<div class="category-title">Navidad</div>
<div class="gallery">

    <div class="product"><img src="SudaderaMX.jpeg"></div>
    <div class="product"><img src="EvanShirt.jpeg"></div>

</div>

<!-- Especiales -->
<div class="category-title">Especiales</div>
<div class="gallery">

    <div class="product"><img src="kitvino.jpeg"></div>

</div>

</section>

<!-- PROCESO -->
<section class="section">

<h2>Proceso</h2>

<div class="steps">
<div class="step"><h3>Idea</h3></div>
<div class="step"><h3>Diseño</h3></div>
<div class="step"><h3>Aprobación</h3></div>
<div class="step"><h3>Entrega</h3></div>
</div>

</section>

<!-- CONTACTO -->
<section class="section">
<h2>Contacto</h2>

<a class="btn">WhatsApp</a>
<a class="btn">Correo</a>

</section>

<footer>
© 2026 Atelier Creatif KM
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <img id="lightbox-img">
</div>

<script>
const products = document.querySelectorAll('.product img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

products.forEach(img => {
    img.addEventListener('click', () => {
        lightbox.style.display = 'flex';
        lightboxImg.src = img.src;
    });
});

lightbox.addEventListener('click', () => {
    lightbox.style.display = 'none';
});
</script>

</body>
</html>
